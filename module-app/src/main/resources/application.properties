server.port=8080
server.servlet.session.timeout=6h
#spring.security.user.password=1

# H2 SQL settings:
spring.datasource.url=jdbc:h2:file:./database/mydatabase1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=1
#schema.sql:
#data.sql:
#https://docs.spring.io/spring-boot/docs/2.1.x/reference/html/howto-database-initialization.html
spring.sql.init.mode=always
#http://localhost:8080/h2-console
spring.h2.console.enabled=true

logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE
logging.level.org.springframework.transaction=DEBUG