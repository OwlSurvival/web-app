<!DOCTYPE html>
<head>
    <meta charset="utf-8">
    <meta name="author" content="Злата">
    <meta name="description" content="Сайт о моей кошке Бетти">
    <meta name="keywords" content="кошка,уход,описание,Бетти">
    <link rel="stylesheet" href="Resources/css/main.css">
    <script type="text/javascript" src="./resources/js/main.js" ></script>
    <script type="text/javascript" src="./resources/js/chart.js"></script>

</head>

<body class="page-with-bg">

<div class="img-cat">
    <img src="Resources/img/head.jpg" width="100%" height="auto" alt="бетта">
</div>

<div class="base-body-cont">

    <div class="left-aside">
        <ul >
            <li><a href="index.html">Главная страница</a></li>
            <li><a href="about_cat.html">Моя Бетта</a></li>
            <li><a href="about.html">Обо мне</a></li>
            <li><a href="edit_data.html">Внесите данные кошки</a></li>

        </ul>
    </div>

    <div class="base-body">

        <div class="base-body-form">
            <center>
                <h2>Дневник вашей кошки</h2>
            </center>
            <form action="" method="post" >
                <label>Выбирите месяц</label>
                <select name="Месяц:" id="Month">
                    <option value="01">Январь</option>
                    <option value="02">Февраль</option>
                    <option value="03">Март</option>
                    <option value="04">Апрель</option>
                    <option value="05">Май</option>
                    <option value="06">Июнь</option>
                    <option value="07">Июль</option>
                    <option value="08">Август</option>
                    <option value="09">Сентябрь</option>
                    <option value="10">Октябрь</option>
                    <option value="11">Ноябрь</option>
                    <option value="12">Декабрь</option>
                </select><br>
                <label>Выбирите год</label>
                <select name="Месяц:" id="Year">
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                    <option value="2027">2027</option>
                </select><br>
                <input type="button" value = "Отрисовать график" onClick="CATS.getDataAndDrawChart()" class="button-add">
            </form>
        </div>

        <table>
            <thead>
            <tr>
                <th>Съедено корма</th>
                <th>Настроение</th>
            </tr>
            </thead>

            <tbody  align="center" id = "catTableBodyId">
            <tr>
                <th>
                <div class="base-body-chart">
                 <canvas id="myChart"  width="600" height="600"></canvas>
                </div>
                </th>
                <th>
                    <div class="base-body-chart">
                        <canvas id="myChart2"  width="600" height="600"></canvas>
                    </div>
                </th>
            </tr>
        </table>
    </div>

</div>

</body>
</html>
